name: Production Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  release:
    types:
      - published

jobs:
  build-production:
    name: Build production outputs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: production/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r production/requirements.txt

      - name: Run production build
        run: python production/src/build_production.py

      - name: Upload production artifacts
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: production-outputs-${{ github.sha }}
          if-no-files-found: error
          path: |
            production/assembled/comprehensive_research.md
            production/method_a_python/*.docx
            production/method_a_python/*.pdf
            production/method_a_python/*.tex
            production/method_b_hybrid/*.docx
            production/method_b_hybrid/*.pdf
            production/method_b_hybrid/*.tex

  publish-release-assets:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build-production
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: production/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r production/requirements.txt

      - name: Run production build
        run: python production/src/build_production.py

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            production/assembled/comprehensive_research.md
            production/method_a_python/*.docx
            production/method_a_python/*.pdf
            production/method_a_python/*.tex
            production/method_b_hybrid/*.docx
            production/method_b_hybrid/*.pdf
            production/method_b_hybrid/*.tex
